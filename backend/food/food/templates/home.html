<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gutly - Smart Grocery Assistant</title>
  <style>
    :root {
      --primary: #4CAF50;
      --primary-dark: #388E3C;
      --primary-light: #A5D6A7;
      --secondary: #FFC107;
      --text: #212121;
      --background: #F5F5F5;
      --white: #FFFFFF;
    }
    body.dark-mode {
      --background: #121212;
      --text: #f5f5f5;
      --primary: #333333;
      --secondary: #555555;
      --white: #1e1e1e;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--background); color: var(--text); }
    header { background-color: var(--primary); color: var(--white); padding:1rem; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    .logo { font-size:1.8rem; font-weight:bold; }
    .hamburger { font-size:1.5rem; cursor:pointer; }
    #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:90; }
    #overlay.show { display:block; }
    #sidebar { position:fixed; top:0; left:0; width:250px; height:100%; background: var(--white); box-shadow:2px 0 5px rgba(0,0,0,0.2); transform:translateX(-100%); transition:transform .3s ease; z-index:100; padding:2rem 1rem; }
    #sidebar.open { transform:translateX(0); }
    #sidebar ul { list-style:none; }
    #sidebar li { margin-bottom:1rem; font-size:1.1rem; }
    #sidebar a { color:var(--text); text-decoration:none; }
    main { max-width:1200px; margin:2rem auto; padding:0 1rem; }
    .container { display:grid; grid-template-columns:1fr; gap:1rem; }
    @media(min-width:768px) { .container { grid-template-columns:3fr 2fr; } }
    .card { background:var(--white); border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); padding:1rem; margin-bottom:1rem; }
    .card h2 { color:var(--primary-dark); margin-bottom:.5rem; border-bottom:1px solid var(--primary-light); padding-bottom:.5rem; }
    .prompt-input { display:flex; margin-bottom:1rem; }
    .prompt-input input { flex:1; padding:.8rem; border:1px solid #ddd; border-radius:4px 0 0 4px; font-size: 1rem; }
    .prompt-input button { background:var(--primary); color:#fff; border:none; border-radius:0 4px 4px 0; padding:0 1rem; cursor:pointer; font-size: 1rem; }
    .prompt-input button:hover { background-color: var(--primary-dark); }
    .dietary-filters { display:flex; gap:.5rem; margin-bottom:1rem; flex-wrap: wrap; }
    .filter-tag { background:var(--primary-light); padding:.3rem .8rem; border-radius:20px; display:flex; align-items:center; }
    .filter-tag span { margin-left:.3rem; cursor:pointer; }
    .budget-input { display:flex; align-items:center; margin-bottom:1rem; }
    .budget-input label { margin-right: 1rem; }
    .budget-input input { width:100px; padding:.5rem; border:1px solid #ddd; border-radius:4px; }
    .food-list { list-style:none; padding:0; }
    .food-item { display:flex; justify-content:space-between; align-items:center; padding:.8rem 0; border-bottom:1px solid #eee; }
    .food-item:last-child { border-bottom:none; }
    .food-item .item-name { flex: 1; }
    .food-item .item-price { color: var(--primary-dark); font-weight: bold; margin-right: 1rem; }
    .item-actions { display:flex; gap:.5rem; }
    .button { background:var(--primary); color:#fff; border:none; border-radius:4px; padding:.5rem 1rem; cursor:pointer; font-size: 0.9rem; }
    .button:hover { opacity: 0.9; }
    .button.secondary { background:var(--secondary); }
    .total-section { display:flex; justify-content:space-between; font-weight:bold; margin-top:1rem; border-top:1px solid var(--primary-light); padding-top:1rem; }
    .status { padding:.2rem .5rem; border-radius:4px; font-size: 0.8rem; }
    .within-budget { background:#C8E6C9; color:#2E7D32; }
    .over-budget { background:#FFCDD2; color:#C62828; }
    .saved-list-item { display:flex; justify-content:space-between; align-items:center; padding:.8rem 0; border-bottom:1px solid #eee; }
    .saved-list-item:hover { background-color: rgba(0,0,0,0.03); }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:200; }
    .modal-content { background:var(--white); margin:15% auto; padding:20px; border-radius:8px; max-width:400px; }
    .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
    .modal-header h3 { color:var(--primary-dark); }
    .close { cursor:pointer; font-size:1.2rem; color: #aaa; font-weight: bold; }
    .close:hover { color: var(--text); }
    .modal-body { margin-bottom:1rem; }
    .modal-body input { width:100%; padding:0.8rem; border:1px solid #ddd; border-radius:4px; font-size:1rem; margin-top:0.5rem; }
    .modal-footer { display:flex; justify-content:flex-end; gap:.5rem; }
    .loading-spinner { display: none; text-align: center; padding: 1rem; }
    .loading-spinner:after {
      content: " ";
      display: inline-block;
      width: 2rem;
      height: 2rem;
      border: 3px solid var(--primary);
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="overlay"></div>
  <aside id="sidebar">
    <ul>
      <li><a href="/">Home</a></li>
      <li><strong>Settings</strong></li>
      <li><label><input type="checkbox" id="dark-mode-toggle"> Enable Dark Mode</label></li>
    </ul>
  </aside>
  <header>
    <div class="logo">Gutly</div>
    <div class="hamburger">☰</div>
  </header>
  <main>
    <div class="container">
      <!-- Left Column -->
      <div>
        <div class="card prompt-section">
          <h2>Kroger</h2>
          <div class="prompt-input">
            <input type="text" id="prompt-input" placeholder="What would you like to eat? (e.g., 'Healthy breakfast under $10')">
            <button id="generate-btn">Generate</button>
          </div>
          <div class="dietary-filters">
            <div class="filter-tag">Vegetarian <span>✕</span></div>
            <div class="filter-tag">Gluten-Free <span>✕</span></div>
          </div>
          <div class="budget-input">
            <label for="budget">Budget:</label>
            <input type="number" id="budget" value="50">
          </div>
          <div class="loading-spinner" id="loading-spinner"></div>
        </div>
        <div class="card">
          <h2>Current List</h2>
          <ul id="current-list" class="food-list"></ul>
        </div>
      </div>
      <!-- Right Column -->
      <div>
        <div class="card">
          <h2>My Shopping List</h2>
          <ul id="shopping-list" class="food-list"></ul>
          <div class="total-section">
            <span>Total:</span>
            <span id="total-amount">$0.00</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:1rem;">
            <span id="budget-status" class="status within-budget">Within Budget</span>
            <button class="button secondary" id="save-list-btn">Save List</button>
          </div>
        </div>
        <div class="card saved-lists">
          <h2>Saved Lists</h2>
          <div id="saved-lists-container"></div>
        </div>
      </div>
    </div>
  </main>
  <div id="save-list-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Save Shopping List</h3>
        <span class="close">&times;</span>
      </div>
      <div class="modal-body">
        <label for="list-name">Enter a name for your list:</label>
        <input type="text" id="list-name" placeholder="e.g., Weekly Groceries">
      </div>
      <div class="modal-footer">
        <button class="button" id="cancel-save">Cancel</button>
        <button class="button secondary" id="confirm-save">Save</button>
      </div>
    </div>
  </div>
  
  <script>
    // Utility functions
    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }

    // API endpoints
    const ENDPOINTS = {
      GENERATE_FOOD: '/generate-items/',
      SAVE_LIST: '/save-list/',
      GET_LISTS: '/saved-lists/',
      DELETE_LIST: '/delete-list/'
    };

    // DOM Elements
    const currentListEl = document.getElementById('current-list');
    const shoppingListEl = document.getElementById('shopping-list');
    const totalAmountEl = document.getElementById('total-amount');
    const budgetInputEl = document.getElementById('budget');
    const budgetStatusEl = document.getElementById('budget-status');
    const saveListBtn = document.getElementById('save-list-btn');
    const saveListModal = document.getElementById('save-list-modal');
    const closeModalBtn = document.querySelector('.close');
    const cancelSaveBtn = document.getElementById('cancel-save');
    const confirmSaveBtn = document.getElementById('confirm-save');
    const listNameInput = document.getElementById('list-name');
    const hamburger = document.querySelector('.hamburger');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const darkToggle = document.getElementById('dark-mode-toggle');
    const loadingSpinner = document.getElementById('loading-spinner');
    
    // App state
    let shoppingListItems = [];
    let savedLists = [];
    
    // Initialize the app
    document.addEventListener('DOMContentLoaded', () => {
      initSidebar();
      initApp();
      loadSavedLists();
    });
    
    // Initialize sidebar functionality
    function initSidebar() {
      hamburger.addEventListener('click', () => {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('show');
      });
      
      overlay.addEventListener('click', () => {
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
      });
      
      darkToggle.addEventListener('change', () => {
        document.body.classList.toggle('dark-mode', darkToggle.checked);
        localStorage.setItem('darkMode', darkToggle.checked ? 'enabled' : 'disabled');
      });
      
      // Check for saved dark mode preference
      if (localStorage.getItem('darkMode') === 'enabled') {
        darkToggle.checked = true;
        document.body.classList.add('dark-mode');
      }
    }
    
    // Initialize app functionality
    function initApp() {
      document.getElementById('generate-btn').addEventListener('click', generateFood);
      saveListBtn.addEventListener('click', () => saveListModal.style.display = 'block');
      closeModalBtn.addEventListener('click', () => saveListModal.style.display = 'none');
      cancelSaveBtn.addEventListener('click', () => saveListModal.style.display = 'none');
      confirmSaveBtn.addEventListener('click', saveShoppingList);
      budgetInputEl.addEventListener('change', updateBudgetStatus);
      
      // Setup filter tag removal
      document.querySelectorAll('.filter-tag span').forEach(span => {
        span.addEventListener('click', e => {
          e.target.parentElement.remove();
        });
      });
      
      updateBudgetStatus();
    }
    
    // Generate food items from API
    async function generateFood() {
      const query = document.getElementById('prompt-input').value.trim();
      const budget = parseFloat(budgetInputEl.value) || 0;
      const filterElements = document.querySelectorAll('.filter-tag');
      const filters = Array.from(filterElements).map(el => el.textContent.trim().replace('✕', '').trim());
      
      if (!query) {
        alert('Please enter what you would like to eat.');
        return;
      }
      
      try {
        loadingSpinner.style.display = 'block';
        
        const response = await fetch(`${ENDPOINTS.GENERATE_FOOD}?query=${encodeURIComponent(query)}&budget=${budget}&filters=${encodeURIComponent(filters.join(','))}`);
        
        if (!response.ok) {
          throw new Error('Failed to fetch items');
        }
        
        const data = await response.json();
        renderGeneratedItems(data.items || []);
      } catch (error) {
        console.error('Error generating food items:', error);
        alert('Error generating food items. Please try again.');
      } finally {
        loadingSpinner.style.display = 'none';
      }
    }
    
    // Render generated items to the UI
    function renderGeneratedItems(items) {
      currentListEl.innerHTML = '';
      
      if (items.length === 0) {
        const li = document.createElement('li');
        li.className = 'food-item';
        li.textContent = 'No items found matching your criteria.';
        currentListEl.appendChild(li);
        return;
      }
      
      items.forEach(item => {
        const li = document.createElement('li');
        li.className = 'food-item';
        li.innerHTML = `
          <div class="item-name">${item.name}</div>
          <div class="item-price">$${parseFloat(item.price).toFixed(2)}</div>
          <div class="item-actions">
            <button class="button add-item-btn">Add</button>
          </div>
        `;
        
        li.querySelector('.add-item-btn').addEventListener('click', () => addToShoppingList(item));
        currentListEl.appendChild(li);
      });
    }
    
    // Add item to shopping list
    function addToShoppingList(item) {
      // Check if the item already exists in the list
      if (!shoppingListItems.some(i => i.name === item.name)) {
        shoppingListItems.push(item);
        renderShoppingList();
        updateBudgetStatus();
      } else {
        alert('This item is already in your shopping list.');
      }
    }
    
    // Remove item from shopping list
    function removeFromShoppingList(index) {
      shoppingListItems.splice(index, 1);
      renderShoppingList();
      updateBudgetStatus();
    }
    
    // Render shopping list to UI
    function renderShoppingList() {
      shoppingListEl.innerHTML = '';
      
      if (shoppingListItems.length === 0) {
        const li = document.createElement('li');
        li.className = 'food-item';
        li.textContent = 'Your shopping list is empty.';
        shoppingListEl.appendChild(li);
        totalAmountEl.textContent = '$0.00';
        return;
      }
      
      shoppingListItems.forEach((item, index) => {
        const li = document.createElement('li');
        li.className = 'food-item';
        li.innerHTML = `
          <div class="item-name">${item.name}</div>
          <div class="item-price">$${parseFloat(item.price).toFixed(2)}</div>
          <div class="item-actions">
            <button class="button remove-item-btn">Remove</button>
          </div>
        `;
        
        li.querySelector('.remove-item-btn').addEventListener('click', () => removeFromShoppingList(index));
        shoppingListEl.appendChild(li);
      });
      
      // Update total
      const total = shoppingListItems.reduce((sum, item) => sum + parseFloat(item.price), 0);
      totalAmountEl.textContent = `$${total.toFixed(2)}`;
    }
    
    // Update budget status
    function updateBudgetStatus() {
      const budget = parseFloat(budgetInputEl.value) || 0;
      const total = shoppingListItems.reduce((sum, item) => sum + parseFloat(item.price), 0);
      
      if (total <= budget) {
        budgetStatusEl.textContent = 'Within Budget';
        budgetStatusEl.className = 'status within-budget';
      } else {
        budgetStatusEl.textContent = 'Over Budget';
        budgetStatusEl.className = 'status over-budget';
      }
    }
    
    // Save shopping list to database
    async function saveShoppingList() {
      const name = listNameInput.value.trim();
      
      if (!name) {
        alert('Please enter a name for your list.');
        return;
      }
      
      if (shoppingListItems.length === 0) {
        alert('Your shopping list is empty. Add some items before saving.');
        return;
      }
      
      try {
        const response = await fetch(ENDPOINTS.SAVE_LIST, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
          },
          body: JSON.stringify({
            name: name,
            items: shoppingListItems
          })
        });
        
        if (!response.ok) {
          throw new Error('Failed to save list');
        }
        
        saveListModal.style.display = 'none';
        listNameInput.value = '';
        await loadSavedLists();
        alert('Shopping list saved successfully!');
      } catch (error) {
        console.error('Error saving list:', error);
        alert('Error saving shopping list. Please try again.');
      }
    }
    
    // Load saved lists from database
    async function loadSavedLists() {
      try {
        const response = await fetch(ENDPOINTS.GET_LISTS);
        
        if (!response.ok) {
          throw new Error('Failed to fetch saved lists');
        }
        
        savedLists = await response.json();
        renderSavedLists();
      } catch (error) {
        console.error('Error loading saved lists:', error);
      }
    }
    
    // Delete a saved list
    async function deleteSavedList(listId) {
      if (!confirm('Are you sure you want to delete this list?')) {
        return;
      }
      
      try {
        const response = await fetch(`${ENDPOINTS.DELETE_LIST}${listId}/`, {
          method: 'DELETE',
          headers: {
            'X-CSRFToken': getCookie('csrftoken')
          }
        });
        
        if (!response.ok) {
          throw new Error('Failed to delete list');
        }
        
        await loadSavedLists();
      } catch (error) {
        console.error('Error deleting list:', error);
        alert('Error deleting list. Please try again.');
      }
    }
    
    // Load a saved list into the shopping list
    function loadSavedList(listData) {
      shoppingListItems = listData.items.map(item => ({
        name: item.name,
        price: parseFloat(item.price)
      }));
      
      renderShoppingList();
      updateBudgetStatus();
    }
    
    // Render saved lists to UI
    function renderSavedLists() {
      const container = document.getElementById('saved-lists-container');
      container.innerHTML = '';
      
      if (savedLists.length === 0) {
        container.textContent = 'No saved lists yet.';
        return;
      }
      
      savedLists.forEach(list => {
        const div = document.createElement('div');
        div.className = 'saved-list-item';
        div.innerHTML = `
          <div>${list.name}</div>
          <div>$${parseFloat(list.total).toFixed(2)}</div>
          <div>
            <button class="button load-list-btn">Load</button>
            <button class="button secondary delete-list-btn">Delete</button>
          </div>
        `;
        
        div.querySelector('.load-list-btn').addEventListener('click', () => loadSavedList(list));
        div.querySelector('.delete-list-btn').addEventListener('click', () => deleteSavedList(list.id));
        
        container.appendChild(div);
      });
    }
  </script>
</body>
</html>
